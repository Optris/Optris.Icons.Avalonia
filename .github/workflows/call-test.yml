name: 📞 Test

on:
  workflow_call:

defaults:
  run:
    working-directory: src

jobs:
  test:
    name: 🧪 Test
    runs-on: ubuntu-latest

    steps:
      - name: 🛒 Checkout
        uses: actions/checkout@v6

      - name: 🟣 Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: 🏗️ Build
        run: >
          dotnet build
          --configuration Release

      - name: 🧪 Test
        run: >
          dotnet test
          --configuration Release
          --no-build
