name: 📦 Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

defaults:
  run:
    working-directory: src

jobs:
  release:
    name: 📦 Pack & Publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Extract version from tag
        id: version
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Pack
        run: |
          dotnet pack Optris.Icons.Avalonia/Optris.Icons.Avalonia.csproj -c Release -o ../artifacts -p:Version=${{ steps.version.outputs.value }}
          dotnet pack Optris.Icons.Avalonia.FontAwesome/Optris.Icons.Avalonia.FontAwesome.csproj -c Release -o ../artifacts -p:Version=${{ steps.version.outputs.value }}
          dotnet pack Optris.Icons.Avalonia.MaterialDesign/Optris.Icons.Avalonia.MaterialDesign.csproj -c Release -o ../artifacts -p:Version=${{ steps.version.outputs.value }}

      - name: Push to NuGet
        working-directory: artifacts
        run: dotnet nuget push "*.nupkg" --source https://api.nuget.org/v3/index.json --api-key ${{ secrets.NUGET_API_KEY }} --skip-duplicate

      - name: Upload artifacts
        uses: actions/upload-artifact@v5
        with:
          name: nupkg
          path: artifacts/*.nupkg
