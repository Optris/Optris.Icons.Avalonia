name: 📞 Release Please

on:
  workflow_call:
    secrets:
      nuget_api_key:
        required: true

defaults:
  run:
    working-directory: src

jobs:
  release-please:
    name: ✨ Release Please
    runs-on: ubuntu-latest
    outputs:
      created: ${{ steps.release.outputs.release_created }}
    steps:
      - name: ✨ Release Please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          config-file: release-please/config.json
          manifest-file: release-please/manifest.json

  publish:
    name: 📦 Publish to NuGet
    runs-on: ubuntu-latest
    needs:
      - release-please
    if: ${{ needs.release-please.outputs.created }}

    steps:
      - name: 🛒 Checkout
        uses: actions/checkout@v4

      - name: 🟣 Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: 📦 Pack
        run: |
          dotnet pack Projektanker.Icons.Avalonia/Projektanker.Icons.Avalonia.csproj -c Release -o ../artifacts
          dotnet pack Projektanker.Icons.Avalonia.FontAwesome/Projektanker.Icons.Avalonia.FontAwesome.csproj -c Release -o ../artifacts
          dotnet pack Projektanker.Icons.Avalonia.MaterialDesign/Projektanker.Icons.Avalonia.MaterialDesign.csproj -c Release -o ../artifacts

      - name: 🚀 Push
        working-directory: artifacts
        run: >
          dotnet nuget push
          *.nupkg
          -k ${{ secrets.nuget_api_key }}
          -s https://api.nuget.org/v3/index.json
          --skip-duplicate
